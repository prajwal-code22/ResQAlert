<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESQALERT</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f7fb;
}

/* Header */
header {
    background: linear-gradient(135deg, #1e4fa3, #2b6edb);
    color: white;
    padding: 20px;
    text-align: center;
    position: relative;
}

header h1 {
    font-size: 28px;
    letter-spacing: 2px;
}

.menu-icon {
    position: absolute;
    right: 20px;
    top: 22px;
    font-size: 26px;
    cursor: pointer;
}

/* Hero Section */
.hero {
    text-align: center;
    padding: 40px 20px;
}

.hero h2 {
    font-size: 22px;
    margin-top: 20px;
    color: #2c3e50;
}

.hero img {
    width: 300px;
    max-width: 100%;
}

/* Buttons */
.button-container {
    padding: 20px;
}

.btn {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 25px;
    border-radius: 15px;
    margin-bottom: 20px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    color: white;
    transition: 0.3s;
}

.btn i {
    font-size: 20px;
}

.btn-red {
    background: #ff3b30;
}

.btn-blue {
    background: #2b6edb;
}

.btn-yellow {
    background: #f4b400;
    color: #222;
}

.btn:hover {
    transform: scale(1.03);
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
}

/* Info Card */
.info-card {
    background: #e8eef9;
    margin: 20px;
    padding: 20px;
    border-radius: 15px;
    color: #333;
}

.info-card h3 {
    margin-bottom: 10px;
}

/* Responsive */
@media (min-width: 768px) {
    .hero img {
        width: 400px;
    }

    .button-container {
        width: 500px;
        margin: auto;
    }
}
</style>
</head>

<body>

<header>
    <h1>RESQALERT</h1>
    <div class="menu-icon">&#9776;</div>
</header>

<section class="hero">
    <img src="https://cdn-icons-png.flaticon.com/512/2966/2966480.png" alt="Emergency">
    <h2>Emergency Response Made Easy</h2>
</section>

<section class="button-container">

    <div class="btn btn-red" onclick="reportEmergency()">
        <span>🚨 Report Emergency</span>
        <span>➜</span>
    </div>

    <div class="btn btn-blue" onclick="viewEmergencies()">
        <span>📋 My Emergencies</span>
        <span>➜</span>
    </div>

    <div class="btn btn-yellow" onclick="findResponders()">
        <span>👤 Find Responders</span>
        <span>➜</span>
    </div>

</section>

<div class="info-card">
    <h3>Welcome to RESQALERT!</h3>
    <p>
        Report emergencies, track your requests, and connect with nearby responders instantly.
    </p>
</div>

<script>
function reportEmergency() {
    alert("Redirect to Emergency Reporting Page");
    // window.location.href = "/report/";
}

function viewEmergencies() {
    alert("Redirect to My Emergencies Page");
}

function findResponders() {
    alert("Redirect to Find Responders Page");
}
</script>

</body>
</html>
